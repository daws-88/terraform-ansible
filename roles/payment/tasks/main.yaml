- name: app setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml

- name: Upgrade system crypto and SSH packages
  ansible.builtin.dnf:
    name:
      - openssl
      - openssl-libs
      - openssh
      - openssh-server
      - openssh-clients
    state: latest
    update_cache: yes

- name: python seup
  ansible.builtin.import_role:
    name: common
    tasks_from: python.yaml

- name: system setup
  ansible.builtin.import_role:
    name: common
    tasks_from: system-setup.yaml
