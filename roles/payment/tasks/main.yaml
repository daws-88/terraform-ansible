- name: app setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml
    
- name: Upgrade system crypto and SSH packages
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: latest
    update_cache: yes
  loop:
  - openssl
  - openssl-libs
  - openssh
  - openssh-server
  - openssh-clients

- name: pythonetup
  ansible.builtin.import_role:
    name: common
    tasks_from: python.yaml

- name: system setup
  ansible.builtin.import_role:
    name: common
    tasks_from: system-setup.yaml
